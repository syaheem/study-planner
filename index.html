<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Neuroscience-backed study planner with exam schedule, spaced repetition, and career roadmap tracking.">
  <title>Study &amp; Roadmap Planner — Syaheem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg-main: #0a0a12;
      --bg-app:  #0f0f1a;
      --bg-card: #16162a;
      --bg-elevated: #1c1c35;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);

      --text-primary: #f0f0ff;
      --text-secondary: #8888bb;
      --text-muted: #55557a;

      --accent: #7c6af7;         /* vivid violet */
      --accent-glow: rgba(124,106,247,0.3);
      --accent2: #00e5cc;        /* cyan */
      --accent2-glow: rgba(0,229,204,0.25);
      --accent3: #f7966a;        /* warm orange */

      --red: #ff6b7a;
      --orange: #f7966a;
      --yellow: #ffd166;
      --green: #4ade80;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --cyan: #00e5cc;

      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      --font-body: 'Inter', system-ui, sans-serif;
      --font-display: 'Outfit', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-main);
      color: var(--text-primary);
      font-family: var(--font-body);
      height: 100dvh;
      margin: 0;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease-in-out;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 18, 0.45);
      z-index: -1;
      pointer-events: none;
    }

    #root {
      width: 100%;
      max-width: 480px;
      background: transparent;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    a { color: var(--accent); text-decoration: none; }
    h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 700; }

    /* ─── SCROLLBARS ─── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ═══════════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════════ */
    .app-header {
      padding: 20px 20px 16px;
      background: linear-gradient(180deg, rgba(124,106,247,0.12) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .app-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
    }
    .header-eyebrow {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 4px;
      font-family: var(--font-body);
    }
    .header-title {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      font-family: var(--font-display);
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0,229,204,0.08);
      border: 1px solid rgba(0,229,204,0.2);
      border-radius: 24px;
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN SCROLL AREA
    ═══════════════════════════════════════════════════════════════ */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 100px;
      overscroll-behavior: contain;
    }

    /* ═══════════════════════════════════════════════════════════════
       GLASS CARD
    ═══════════════════════════════════════════════════════════════ */
    .glass {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════
       SECTION HEADING
    ═══════════════════════════════════════════════════════════════ */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-heading-icon { font-size: 18px; }
    .section-heading-text {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ═══════════════════════════════════════════════════════════════
       BADGE
    ═══════════════════════════════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge-exam { background: rgba(255,107,122,0.15); color: var(--red); border: 1px solid rgba(255,107,122,0.25); }
    .badge-urgent { background: rgba(255,107,122,0.15); color: var(--red); }
    .badge-done  { background: rgba(74,222,128,0.12);  color: var(--green); }
    .badge-today { background: rgba(255,209,102,0.15); color: var(--yellow); }
    .badge-normal { background: rgba(255,255,255,0.07); color: var(--text-secondary); }

    /* ═══════════════════════════════════════════════════════════════
       PROGRESS BARS
    ═══════════════════════════════════════════════════════════════ */
    .progress-track {
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ═══════════════════════════════════════════════════════════════
       OVERALL PROGRESS HEADER STRIP
    ═══════════════════════════════════════════════════════════════ */
    .overall-progress-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: 16px;
    }
    .overall-progress-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .overall-progress-pct {
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    /* ═══════════════════════════════════════════════════════════════
       DAY SCROLLER
    ═══════════════════════════════════════════════════════════════ */
    .day-scroller {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 0 12px;
      margin-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .day-scroller::-webkit-scrollbar { display: none; }

    .day-pill {
      min-width: 56px;
      height: 70px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .day-pill:hover:not(.active) {
      border-color: var(--border-hover);
      background: var(--bg-elevated);
    }
    .day-pill.active {
      background: linear-gradient(135deg, var(--accent), rgba(124,106,247,0.7));
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .day-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-pill.active .day-name { color: rgba(255,255,255,0.75); }
    .day-date {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      font-family: var(--font-display);
    }
    .day-pill.active .day-date { color: #fff; }
    .dot-today {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--yellow);
      margin-top: 2px;
    }
    .day-pill.active .dot-today { background: rgba(255,255,255,0.9); }
    .dot-exam {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
      margin-top: 2px;
    }

    /* ═══════════════════════════════════════════════════════════════
       STATUS BANNER
    ═══════════════════════════════════════════════════════════════ */
    .status-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border-radius: var(--r-lg);
      margin-bottom: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .status-banner.exam-day {
      border-left: 3px solid var(--red);
      background: rgba(255,107,122,0.06);
    }
    .status-banner.study-day {
      border-left: 3px solid var(--accent);
    }
    .status-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status-title {
      font-size: 15px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: var(--font-display);
    }
    .progress-ring {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .progress-count {
      font-size: 13px;
      font-weight: 800;
      color: var(--accent);
    }
    .progress-text {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .progress-track-sm {
      width: 70px;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════
       TASK CARDS (deep / shallow)
    ═══════════════════════════════════════════════════════════════ */
    .task-card {
      display: flex;
      gap: 14px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      border-left: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .task-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .task-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .task-card.is-done {
      opacity: 0.45;
      filter: grayscale(0.4);
    }
    .task-card.is-done .check-box {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    .check-box {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      flex-shrink: 0;
      color: transparent;
      transition: all 0.25s ease;
      margin-top: 1px;
    }

    .deep-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .deep-topics {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.6;
      color: #d0d0ee;
      margin-bottom: 12px;
    }
    .deep-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: var(--r-sm);
    }
    .deep-detail-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .shallow-label { font-size: 12px; font-weight: 800; }
    .shallow-time { font-size: 11px; color: var(--text-muted); }
    .shallow-task { font-size: 13px; line-height: 1.5; color: var(--text-primary); margin-top: 4px; }

    /* ═══════════════════════════════════════════════════════════════
       NEURO TIP
    ═══════════════════════════════════════════════════════════════ */
    .neuro-tip {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      background: linear-gradient(135deg, rgba(124,106,247,0.08), rgba(0,229,204,0.04));
      border: 1px solid rgba(124,106,247,0.2);
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md);
      margin-bottom: 20px;
    }
    .neuro-tip-icon { font-size: 22px; flex-shrink: 0; }
    .neuro-tip-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .neuro-tip-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ═══════════════════════════════════════════════════════════════
       DAY NAV
    ═══════════════════════════════════════════════════════════════ */
    .day-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
    }
    .day-nav-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-weight: 700;
      font-size: 13px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .day-nav-btn:hover:not(:disabled) {
      background: var(--bg-elevated);
      border-color: var(--accent);
      color: var(--accent);
    }
    .day-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ═══════════════════════════════════════════════════════════════
       NEURO TAB
    ═══════════════════════════════════════════════════════════════ */
    .neuro-timeline {
      position: relative;
      margin: 20px 0 28px;
    }
    .neuro-timeline-line {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      opacity: 0.3;
      z-index: 1;
    }
    .neuro-nodes {
      display: flex;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }
    .neuro-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.3s ease;
    }
    .neuro-node.active { opacity: 1; transform: scale(1.1); }
    .neuro-node-circle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
    }
    .neuro-node.active .neuro-node-circle {
      border-color: var(--accent);
      background: rgba(124,106,247,0.15);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .neuro-node-time {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .neuro-detail-card {
      padding: 20px;
      background: linear-gradient(135deg, rgba(124,106,247,0.08), rgba(0,229,204,0.04));
      border: 1px solid rgba(124,106,247,0.2);
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md);
      margin-bottom: 20px;
    }
    .neuro-principle-card {
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      transition: all 0.2s;
    }
    .neuro-principle-card:hover {
      border-color: var(--border-hover);
    }
    .neuro-principle-icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(124,106,247,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       SUBJECTS TAB
    ═══════════════════════════════════════════════════════════════ */
    .subject-card {
      position: relative;
      padding: 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      transition: all 0.2s;
    }
    .subject-card:hover { border-color: var(--border-hover); }
    .subject-card-glow {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
    }
    .subject-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .subject-card-info { display: flex; gap: 12px; align-items: flex-start; }
    .subject-card-icon { font-size: 26px; }
    .subject-card-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; font-family: var(--font-display); }
    .subject-card-sub { font-size: 12px; color: var(--text-secondary); }
    .subject-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: var(--r-sm);
    }
    .subject-stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 1px; }
    .subject-stat-value { font-size: 13px; font-weight: 800; }
    .subject-progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 6px;
    }

    /* ═══════════════════════════════════════════════════════════════
       ROADMAP TAB
    ═══════════════════════════════════════════════════════════════ */
    .phase-btn {
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.25s ease;
    }
    .phase-btn:hover { border-color: var(--border-hover); background: var(--bg-elevated); }
    .phase-btn.active { transform: translateY(-1px); }
    .phase-btn-left { display: flex; align-items: center; gap: 12px; }
    .phase-btn-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .phase-btn-label { font-size: 14px; font-weight: 800; font-family: var(--font-display); }
    .phase-btn-period { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .phase-detail {
      padding: 22px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      border-left: 3px solid var(--accent);
    }
    .phase-milestone {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.6;
    }
    .phase-milestone-num {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       BOTTOM NAV
    ═══════════════════════════════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;

      position: relative;

let state = {
  tab: 'exam',
  dayIdx: 0,
  done: loadDone(),
  activeNeuroNode: 1,
  activePhase: 1,
};

function loadDone() {
  try { return new Set(JSON.parse(localStorage.getItem('rdone2') || '[]')); }
  catch { return new Set(); }
}
function saveDone() {
  try { localStorage.setItem('rdone2', JSON.stringify([...state.done])); } catch{}
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function toggle(k) {
  const n = new Set(state.done);
  n.has(k) ? n.delete(k) : n.add(k);
  state.done = n;
  saveDone();
  render();
}

// ─────────────────────────────────────────────────────────────────
// COMPUTED
// ─────────────────────────────────────────────────────────────────
function getSubjectStats() {
  const stats = {};
  Object.keys(SUBJECTS).forEach(k => { stats[k] = { total:0, completed:0 }; });
  DAYS.forEach((d, di) => {
    d.deepBlocks.forEach((b, bi) => {
      if (!stats[b.subject]) return;
      stats[b.subject].total++;
      if (state.done.has(`d${di}-deep-${bi}`)) stats[b.subject].completed++;
    });
    d.shallowBlocks.forEach((b, bi) => {
      if (!b.subject || !stats[b.subject]) return;
      stats[b.subject].total++;
      if (state.done.has(`d${di}-shallow-${bi}`)) stats[b.subject].completed++;
    });
  });
  return stats;
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'onclick') e.addEventListener('click', v);
      else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
      else if (k === 'className') e.className = v;
      else if (k === 'innerHTML') e.innerHTML = v;
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else if (c instanceof HTMLElement) e.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => x && e.appendChild(x instanceof HTMLElement ? x : document.createTextNode(String(x))));
  }
  return e;
}

function div(cls, ...children) {
  return el('div', cls ? { className: cls } : {}, ...children);
}

function span(cls, text) {
  const e = document.createElement('span');
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function btn(cls, text, onclick) {
  return el('button', { className: cls, onclick }, text);
}

// ─────────────────────────────────────────────────────────────────
// COMPONENTS
// ─────────────────────────────────────────────────────────────────
function Badge(text, extraClass, extraStyle) {
  const e = span('badge ' + (extraClass || ''), text);
  if (extraStyle) Object.assign(e.style, extraStyle);
  return e;
}

function ProgressFill(pct, color) {
  const track = div('progress-track');
  const fill = div('progress-fill');
  fill.style.width = pct + '%';
  if (color) fill.style.background = color;
  track.appendChild(fill);
  return track;
}

  container.appendChild(nav);

  return container;

    btn.addEventListener('click', () => setState({ activePhase: p.id }));

    const left = div('phase-btn-left');
    const dot = div('phase-btn-dot');
    dot.style.background = p.color;
    dot.style.boxShadow = `0 0 8px ${p.color}`;
    left.appendChild(dot);
    const labelWrap = div('');
    labelWrap.appendChild(div('phase-btn-label', p.label));
    labelWrap.appendChild(div('phase-btn-period', p.period));
    left.appendChild(labelWrap);
    btn.appendChild(left);
    btn.appendChild(Badge(p.income, '', { background: p.color + '15', color: p.color, fontSize: '10px' }));
    selector.appendChild(btn);
  });
  container.appendChild(selector);

  // Active phase detail
  const ph = PHASES.find(p => p.id === state.activePhase);
  if (ph) {
    const detail = div('phase-detail mb-20');
    detail.style.borderLeftColor = ph.color;

    const detailHead = div('flex justify-between mb-20');
    detailHead.style.flexWrap = 'wrap';
    detailHead.style.gap = '12px';

    const headLeft = div('');
    headLeft.appendChild(Badge(`${ph.label} · ${ph.period}`, '', { background: ph.color + '15', color: ph.color, marginBottom: '8px', display: 'inline-flex' }));
    const headTitle = el('h3', { className: 'fw-800 fs-17 col-white font-display' }, ph.title);
    headLeft.appendChild(headTitle);
    detailHead.appendChild(headLeft);

    const incomeBox = div('');
    incomeBox.style.cssText = 'background:rgba(0,229,204,0.06);border:1px solid rgba(0,229,204,0.15);border-radius:var(--r-sm);padding:10px 14px;text-align:right';
    incomeBox.innerHTML = `<div style="font-size:9px;color:var(--text-muted);font-weight:800;text-transform:uppercase;margin-bottom:2px">Target</div><div style="font-size:16px;color:var(--cyan);font-weight:900;font-family:var(--font-display)">${ph.income}</div>`;
    detailHead.appendChild(incomeBox);
    detail.appendChild(detailHead);

    const focusWrap = el('div', { style: { marginBottom: '20px' } });
    focusWrap.innerHTML = `<h4 style="font-size:10px;color:var(--text-muted);font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Strategic Focus</h4><p style="font-size:13px;color:var(--text-primary);line-height:1.65">${ph.focus}</p>`;
    detail.appendChild(focusWrap);

    const milestoneTitle = el('h4', { style: { fontSize:'10px', color:'var(--text-muted)', fontWeight:'800', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'12px' } }, 'Milestones');
    detail.appendChild(milestoneTitle);

    const milestoneList = div('flex flex-col gap-12');
    ph.milestones.forEach((m, idx) => {
      const row = div('phase-milestone');
      const num = div('phase-milestone-num', String(idx + 1));
      num.style.color = ph.color;
      num.style.background = ph.color + '15';
      row.appendChild(num);
      row.appendChild(el('span', { className: 'fs-13 lh-16 col-secondary' }, m));
      milestoneList.appendChild(row);
    });
    detail.appendChild(milestoneList);
    container.appendChild(detail);
  }

  return container;
}

// ─────────────────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────────────────
const TABS = [
  { id:'exam',     icon:'🏠', label:'Schedule' },
  { id:'neuro',    icon:'🧬', label:'Science'  },
  { id:'subjects', icon:'📊', label:'Matrix'   },
  { id:'roadmap',  icon:'🚀', label:'Roadmap'  },
];

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  const bgMap = {
    'exam': 'assets/bg_schedule.png',
    'neuro': 'assets/bg_science.png',
    'subjects': 'assets/bg_matrix.png',
    'roadmap': 'assets/bg_roadmap.png'
  };
  document.body.style.backgroundImage = `url('${bgMap[state.tab]}')`;

  // Header
  const header = el('header', { className: 'app-header' });
  const headerInner = div('header-inner');
  const brand = div('');
  brand.appendChild(span('header-eyebrow', 'Syaheem · IIUM CS · Jun–Jul 2026'));
  brand.appendChild(el('h1', { className: 'header-title' }, 'Study & Career Planner'));
  headerInner.appendChild(brand);

  // Days left badge
  const today = DAYS.find(d => d.today);
  const nextExam = today ? Object.values(SUBJECTS).reduce((a, b) => a.daysLeft < b.daysLeft ? a : b) : null;
  if (nextExam) {
    const hBadge = div('header-badge');
    hBadge.innerHTML = `<span>⚡</span> ${nextExam.daysLeft}d to ${nextExam.short}`;
    headerInner.appendChild(hBadge);
  }
  header.appendChild(headerInner);
  root.appendChild(header);

  // Main
  const main = el('main', { className: 'main-content' });
  let tabContent;
  if (state.tab === 'exam')     tabContent = renderExamTab();
  else if (state.tab === 'neuro')    tabContent = renderNeuroTab();
  else if (state.tab === 'subjects') tabContent = renderSubjectsTab();
  else if (state.tab === 'roadmap')  tabContent = renderRoadmapTab();
  if (tabContent) main.appendChild(tabContent);
  root.appendChild(main);

  // Bottom nav
  const nav = el('nav', { className: 'bottom-nav', id: 'mobile-nav' });
  TABS.forEach(t => {
    const btn = el('button', {
      className: `nav-btn ${state.tab === t.id ? 'active' : ''}`,
      onclick: () => setState({ tab: t.id })
    });
    btn.style.position = 'relative';
    btn.appendChild(span('nav-btn-icon', t.icon));
    btn.appendChild(span('nav-btn-label', t.label));
    const indicator = div('nav-indicator');
    btn.appendChild(indicator);
    nav.appendChild(btn);
  });
  root.appendChild(nav);

  // Scroll day pill into view
  if (state.tab === 'exam') {
    setTimeout(() => {
      const pills = document.querySelectorAll('.day-pill');
      if (pills[state.dayIdx]) {
        pills[state.dayIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 50);
  }
}

// Initial render
render();
</script>
</body>
</html>
